---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ansible-core ansible-lint
          ansible-galaxy collection install \
            community.general \
            amazon.aws \
            community.aws \
            ansible.posix
      - name: Run ansible-lint
        run: ansible-lint
        env:
          ANSIBLE_ROLES_PATH: ./roles
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ansible-core
          ansible-galaxy collection install \
            community.general \
            amazon.aws \
            community.aws \
            ansible.posix
      - name: Create stub inventory for syntax check
        run: |
          mkdir -p inventory/group_vars
          cat > inventory/hosts.yml << 'EOF'
          proxmox:
            hosts:
              pve-01:
                ansible_host: 192.168.1.1
                pve_nvme_provision: false
                pbs_server: "192.168.1.2"
                pbs_storage_id: "pbs-main"
                pbs_datastore_name: "main"
                pbs_backup_user: "backup-user@pbs"
                pbs_backup_schedule: "2:00"
                pbs_backup_mode: "snapshot"
          pbs:
            hosts:
              pbs-01:
                ansible_host: 192.168.1.2
                pbs_datastore_name: "main"
                pbs_datastore_path: "/mnt/backups"
                pbs_nfs_server: "192.168.1.4"
                pbs_nfs_export: "/mnt/pool/dataset"
                pbs_backup_user: "backup-user@pbs"
                pbs_backup_user_password: "dummy"
          teleport:
            hosts:
              teleport-01:
                ansible_host: 192.168.1.3
          EOF
          cat > inventory/group_vars/all.yml << 'EOF'
          aws_profile: "dummy"
          aws_region: "us-east-1"
          proxmox_user: "sysop"
          ansible_service_user: "ansible"
          proxmox_ssh_port: 2222
          proxmox_gui_port: 8006
          proxmox_debian_release: "trixie"
          admin_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5 dummy"
          ansible_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5 dummy"
          admin_password: "dummy"
          root_password: "dummy"
          cloudflare_token: "dummy"
          cloudflare_zone_id: "dummy"
          cert_email: "admin@example.com"
          teleport_domain: "teleport.example.com"
          teleport_wildcard_domain: ""
          teleport_agent_version: "17.0.0"
          teleport_apps:
            - name: proxmox-pve
              description: "Proxmox VE"
              uri: "https://192.168.1.1:8006"
              public_addr: "pve-01.teleport.example.com"
              insecure_skip_verify: true
              install_agent: false
              labels:
                env: infra
                type: hypervisor
            - name: proxmox-pbs
              description: "Proxmox Backup Server"
              uri: "https://192.168.1.2:8007"
              public_addr: "pbs-01.teleport.example.com"
              insecure_skip_verify: true
              install_agent: false
              labels:
                env: infra
                type: backup
            - name: truenas
              description: "TrueNAS"
              uri: "https://192.168.1.3"
              public_addr: "192.168.1.3"
              insecure_skip_verify: true
              install_agent: false
              labels:
                env: infra
                type: storage
          pve_host: "192.168.1.1"
          pbs_host: "192.168.1.2"
          truenas_host: "192.168.1.3"
          smtp_server: "email-smtp.us-east-1.amazonaws.com"
          smtp_port: 587
          smtp_from: "alerts@example.com"
          smtp_to: "admin@example.com"
          smtp_user: "dummy"
          smtp_pass: "dummy"
          terraform_tmp_pass: "dummy"
          packer_api_password: "dummy"
          mgmt_cidrs:
            - 192.168.1.0/24
          pve_network_cidr: "192.168.1.0/24"
          proxmox_firewall_enable_datacenter: true
          proxmox_firewall_enable_node: true
          proxmox_firewall_policy_in: DROP
          proxmox_firewall_policy_out: ACCEPT
          proxmox_firewall_policy_forward: ACCEPT
          proxmox_firewall_ebtables: true
          proxmox_manage_cluster_fw: true
          proxmox_manage_host_fw: true
          pve_bridge: "vmbr0"
          pve_snippet_storage: "local"
          pve_snippet_path: "/var/lib/vz/snippets"
          EOF
      - name: Syntax check bootstrap
        run: >
          ansible-playbook playbooks/bootstrap.yml
          --syntax-check
          -i inventory/hosts.yml
      - name: Syntax check site
        run: >
          ansible-playbook playbooks/site.yml
          --syntax-check
          -i inventory/hosts.yml
      - name: Syntax check pbs
        run: >
          ansible-playbook playbooks/pbs.yml
          --syntax-check
          -i inventory/hosts.yml
      - name: Syntax check teleport
        run: >
          ansible-playbook playbooks/teleport.yml
          --syntax-check
          -i inventory/hosts.yml
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
