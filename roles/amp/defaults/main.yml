---
# ─── ADS ──────────────────────────────────────────────────────────────────────
# amp_ads_port and amp_ads_host are set in inventory/group_vars/all.yml.
amp_ads_admin_user: "admin"

# ─── SSM Parameter Paths ──────────────────────────────────────────────────────
# Override if your SSM parameter tree uses a different path prefix.
amp_ssm_admin_password: "/infra/amp/admin_password"
amp_ssm_sys_password: "/infra/amp/sys_password"
amp_ssm_licence_key: "/infra/amp/licence_key"
amp_ssm_oidc_client_secret: "/infra/svc/oidc/amp/client_secret"

# ─── Firewall ─────────────────────────────────────────────────────────────────
# Inbound rules applied by the firewall task. Set per-group in group_vars.
amp_firewall_rules: []

# ─── Game Data NFS ────────────────────────────────────────────────────────────
# TrueNAS NFS share for game-server data storage (target node only).
# uid/gid must match TrueNAS amp_user/amp_group (see truenas-playbook datasets).
# TrueNAS uses mapall → amp_user so all writes land as uid 2003 on TrueNAS.
amp_nfs_server: "{{ truenas_host }}"
amp_nfs_export: "/mnt/vault/gamedata"
amp_nfs_mount_point: "/mnt/gamedata"
amp_nfs_opts: "defaults,nofail,_netdev,nfsvers=4"
amp_nfs_uid: 2003
amp_nfs_gid: 2003
