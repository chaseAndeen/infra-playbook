---
- name: System | Install apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - apt-transport-https
      # ampinstmgr runtime dependencies
      - tmux
      - socat
      - unzip
      - git
      - wget
      - xz-utils
      - numactl
      - bzip2
      # .NET runtime dependencies required by AMP
      - libicu76
      - lib32gcc-s1
      - lib32stdc++6
    state: present
    update_cache: true

- name: System | Check if ampinstmgr is already installed
  ansible.builtin.command: dpkg-query -W -f='${Status}' ampinstmgr
  register: _ampinstmgr_installed
  changed_when: false
  failed_when: false

- name: System | Download ampinstmgr deb
  ansible.builtin.get_url:
    url: https://repo.cubecoders.com/ampinstmgr-2.7.x86_64.deb
    dest: /tmp/ampinstmgr.deb
    mode: "0644"
    checksum: "sha256:1ad3cde20f5b22a098bb3b94669f11a4e6422f293e0d8d5cc09c711452328463"
  when: "'install ok installed' not in _ampinstmgr_installed.stdout"

- name: System | Install ampinstmgr
  ansible.builtin.apt:
    deb: /tmp/ampinstmgr.deb
    state: present
  when: "'install ok installed' not in _ampinstmgr_installed.stdout"

- name: System | Remove downloaded deb
  ansible.builtin.file:
    path: /tmp/ampinstmgr.deb
    state: absent

# Reverse any previously installed su shim (was added in error — su -i never
# existed in util-linux; the real fix is running ampinstmgr as the amp user).
# Only act if su.orig exists — that is the divert marker. If the divert was
# never applied (or was already reversed), leave /usr/bin/su untouched.
- name: System | Check if su divert marker exists
  ansible.builtin.stat:
    path: /usr/bin/su.orig
  register: _su_orig

- name: System | Remove su shim if divert was applied
  ansible.builtin.file:
    path: /usr/bin/su
    state: absent
  when: _su_orig.stat.exists

- name: System | Reverse dpkg-divert for su if applied
  ansible.builtin.command:
    cmd: dpkg-divert --remove --rename /usr/bin/su
    removes: /usr/bin/su.orig
  changed_when: true
  when: _su_orig.stat.exists

# Restore the real su binary if missing (e.g. shim was removed but divert
# reversal didn't restore it because su.orig was already absent).
- name: System | Check if su binary is present
  ansible.builtin.stat:
    path: /usr/bin/su
  register: _su_binary

- name: System | Restore real su binary via util-linux reinstall
  ansible.builtin.command:
    cmd: apt-get install --reinstall -y util-linux
  when: not _su_binary.stat.exists
  changed_when: true

- name: System | Create amp user for AMP instance management
  ansible.builtin.user:
    name: amp
    home: /home/amp
    shell: /bin/bash
    create_home: true
    system: false
    state: present
