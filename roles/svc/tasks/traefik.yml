---
# svc_docker_gid is discovered in system.yml, but may be unset when running
# with tags that skip system tasks. Discover it here as a fallback.
- name: Traefik | Discover docker group GID
  ansible.builtin.command: getent group docker
  register: _docker_group_traefik
  changed_when: false
  when: svc_docker_gid == ""

- name: Traefik | Set docker GID fact (fallback)
  ansible.builtin.set_fact:
    svc_docker_gid: "{{ _docker_group_traefik.stdout.split(':')[2] }}"
  when: svc_docker_gid == ""

- name: Traefik | Create compose directory
  ansible.builtin.file:
    path: "{{ svc_compose_dir }}/traefik"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Traefik | Create dynamic config directory
  ansible.builtin.file:
    path: "{{ svc_compose_dir }}/traefik/dynamic"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Traefik | Template middlewares dynamic config
  ansible.builtin.template:
    src: traefik/dynamic/middlewares.yml.j2
    dest: "{{ svc_compose_dir }}/traefik/dynamic/middlewares.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Traefik | Template dashboard dynamic config
  ansible.builtin.template:
    src: traefik/dynamic/dashboard.yml.j2
    dest: "{{ svc_compose_dir }}/traefik/dynamic/dashboard.yml"
    owner: root
    group: root
    mode: "0644"

- name: Traefik | Template proxy services dynamic config
  ansible.builtin.template:
    src: traefik/dynamic/services.yml.j2
    dest: "{{ svc_compose_dir }}/traefik/dynamic/services.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Traefik | Template environment file
  ansible.builtin.template:
    src: traefik/.env.j2
    dest: "{{ svc_compose_dir }}/traefik/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart traefik

- name: Traefik | Template static config
  ansible.builtin.template:
    src: traefik/traefik.yml.j2
    dest: "{{ svc_compose_dir }}/traefik/traefik.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Traefik | Template docker-compose.yml
  ansible.builtin.template:
    src: traefik/docker-compose.yml.j2
    dest: "{{ svc_compose_dir }}/traefik/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Traefik | Pull images
  ansible.builtin.command: docker compose pull
  args:
    chdir: "{{ svc_compose_dir }}/traefik"
  changed_when: false

- name: Traefik | Deploy stack
  ansible.builtin.command: docker compose up -d --remove-orphans
  args:
    chdir: "{{ svc_compose_dir }}/traefik"
  register: _traefik_up
  changed_when: "'Started' in _traefik_up.stdout or 'Recreated' in _traefik_up.stdout"
