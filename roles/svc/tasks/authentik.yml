# ─── LDAP outpost token — sync Authentik → SSM → container ───────────────────
# Authentik is the authoritative source. We always fetch the current token and
# compare it against SSM. If they differ (first run, fresh Authentik install,
# or manual token rotation), SSM is updated and the container is restarted.
# No manual SSM cleanup is needed between environment rebuilds.

- name: Authentik | Fetch LDAP outpost token metadata
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/core/tokens/?identifier=ak-outpost-truenas-ldap-outpost"
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    status_code: 200
  register: _ldap_outpost_token_meta
  delegate_to: localhost
  become: false

- name: Authentik | Fetch LDAP outpost token key from Authentik
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/core/tokens/{{ (_ldap_outpost_token_meta.json.results | first).pk }}/view_key/"
    method: POST
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    status_code: 200
  register: _ldap_outpost_token_key
  no_log: true
  delegate_to: localhost
  become: false
  when: _ldap_outpost_token_meta.json.pagination.count | int > 0

- name: Authentik | Read current LDAP outpost token from SSM
  ansible.builtin.command: >
    aws ssm get-parameter
    --name "/infra/svc/ldap/outpost_token"
    --with-decryption
    --query "Parameter.Value"
    --output text
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  register: _ldap_outpost_token_ssm
  ignore_errors: true
  changed_when: false
  no_log: true
  become: false
  delegate_to: localhost
  when: _ldap_outpost_token_key is not skipped

- name: Authentik | Update LDAP outpost token in SSM if changed
  ansible.builtin.command: >
    aws ssm put-parameter
    --name "/infra/svc/ldap/outpost_token"
    --type SecureString
    --value "{{ _ldap_outpost_token_key.json.key }}"
    --overwrite
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  no_log: true
  become: false
  delegate_to: localhost
  register: _ldap_token_updated
  when:
    - _ldap_outpost_token_key is not skipped
    - _ldap_outpost_token_ssm is failed or
      _ldap_outpost_token_ssm.stdout | trim != _ldap_outpost_token_key.json.key

- name: Authentik | Re-template .env with updated LDAP outpost token
  ansible.builtin.template:
    src: authentik/.env.j2
    dest: "{{ svc_compose_dir }}/authentik/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: _ldap_token_updated is changed

- name: Authentik | Restart LDAP outpost container with updated token
  ansible.builtin.command: docker compose up -d --force-recreate authentik-ldap
  args:
    chdir: "{{ svc_compose_dir }}/authentik"
  when: _ldap_token_updated is changed
  changed_when: true

