# ─── Add amp_oidc_admins to AMP_Super Admins group ─────────────────────────────

- name: Authentik | Get AMP_Super Admins group PK
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/core/groups/?name={{ amp_oidc_superadmin_group | urlencode }}"
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    status_code: 200
  register: _amp_superadmin_group
  delegate_to: localhost
  become: false

- name: Authentik | Get PKs for amp_oidc_admins users
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/core/users/?username={{ item }}"
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    status_code: 200
  register: _amp_admin_users
  loop: "{{ amp_oidc_admins }}"
  delegate_to: localhost
  become: false

- name: Authentik | Add amp_oidc_admins to AMP_Super Admins group
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/core/users/{{ item.json.results[0].pk }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    body_format: json
    body:
      groups: "{{ item.json.results[0].groups + [_amp_superadmin_group.json.results[0].pk] }}"
    status_code: [200, 201]
  loop: "{{ _amp_admin_users.results }}"
  when:
    - (_amp_superadmin_group.json.pagination.count | int) > 0
    - (item.json.pagination.count | int) > 0
    - (_amp_superadmin_group.json.results[0].pk | string) not in (item.json.results[0].groups | map('string') | list)
  delegate_to: localhost
  become: false
