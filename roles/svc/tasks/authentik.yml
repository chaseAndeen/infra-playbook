---
- name: Authentik | Check for existing secret_key in SSM
  ansible.builtin.command: >
    aws ssm get-parameter
    --name "/infra/svc/authentik/secret_key"
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  register: _authentik_secret_key
  ignore_errors: true
  changed_when: false
  no_log: true
  become: false
  delegate_to: localhost

- name: Authentik | Generate and store secret_key in SSM
  ansible.builtin.command: >
    aws ssm put-parameter
    --name "/infra/svc/authentik/secret_key"
    --type SecureString
    --value "{{ lookup('ansible.builtin.pipe', 'openssl rand -base64 60') | trim }}"
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  no_log: true
  become: false
  delegate_to: localhost
  when: _authentik_secret_key is failed

- name: Authentik | Check for existing postgres_password in SSM
  ansible.builtin.command: >
    aws ssm get-parameter
    --name "/infra/svc/authentik/postgres_password"
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  register: _authentik_postgres_password
  ignore_errors: true
  changed_when: false
  no_log: true
  become: false
  delegate_to: localhost

- name: Authentik | Generate and store postgres_password in SSM
  ansible.builtin.command: >
    aws ssm put-parameter
    --name "/infra/svc/authentik/postgres_password"
    --type SecureString
    --value "{{ lookup('ansible.builtin.pipe', 'openssl rand -base64 32') | trim }}"
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  no_log: true
  become: false
  delegate_to: localhost
  when: _authentik_postgres_password is failed

- name: Authentik | Check for existing bootstrap_token in SSM
  ansible.builtin.command: >
    aws ssm get-parameter
    --name "/infra/svc/authentik/bootstrap_token"
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  register: _authentik_bootstrap_token
  ignore_errors: true
  changed_when: false
  no_log: true
  become: false
  delegate_to: localhost

- name: Authentik | Generate and store bootstrap_token in SSM
  ansible.builtin.command: >
    aws ssm put-parameter
    --name "/infra/svc/authentik/bootstrap_token"
    --type SecureString
    --value "{{ lookup('ansible.builtin.pipe', 'openssl rand -hex 32') | trim }}"
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  no_log: true
  become: false
  delegate_to: localhost
  when: _authentik_bootstrap_token is failed

- name: Authentik | Check for existing LDAP bind password in SSM
  ansible.builtin.command: >
    aws ssm get-parameter
    --name "/infra/svc/ldap/bind_password"
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  register: _ldap_bind_password_check
  ignore_errors: true
  changed_when: false
  no_log: true
  become: false
  delegate_to: localhost

- name: Authentik | Generate and store LDAP bind password in SSM
  ansible.builtin.command: >
    aws ssm put-parameter
    --name "/infra/svc/ldap/bind_password"
    --type SecureString
    --value "{{ lookup('ansible.builtin.pipe', 'openssl rand -base64 32') | trim }}"
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  no_log: true
  become: false
  delegate_to: localhost
  when: _ldap_bind_password_check is failed

- name: Authentik | Check for existing OIDC client secret in SSM
  ansible.builtin.command: >
    aws ssm get-parameter
    --name "/infra/svc/oidc/{{ item.name }}/client_secret"
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  register: _oidc_secret_check
  loop: "{{ proxy_services | selectattr('auth', 'equalto', 'oidc') | list }}"
  loop_control:
    label: "{{ item.name }}"
  ignore_errors: true
  changed_when: false
  no_log: true
  become: false
  delegate_to: localhost

- name: Authentik | Generate and store OIDC client secret in SSM
  ansible.builtin.command: >
    aws ssm put-parameter
    --name "/infra/svc/oidc/{{ item.item.name }}/client_secret"
    --type SecureString
    --value "{{ lookup('ansible.builtin.pipe', 'openssl rand -hex 32') | trim }}"
    --profile "{{ aws_profile }}"
    --region "{{ aws_region }}"
  loop: "{{ _oidc_secret_check.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item is failed
  no_log: true
  become: false
  delegate_to: localhost

- name: Authentik | Create compose directory
  ansible.builtin.file:
    path: "{{ svc_compose_dir }}/authentik"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Authentik | Create blueprints directory
  ansible.builtin.file:
    path: "{{ svc_compose_dir }}/authentik/blueprints"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Authentik | Remove legacy proxy-services.yml (wrong extension, not picked up by Authentik)
  ansible.builtin.file:
    path: "{{ svc_compose_dir }}/authentik/blueprints/proxy-services.yml"
    state: absent

- name: Authentik | Template proxy-services blueprint
  ansible.builtin.template:
    src: authentik/blueprints/proxy-services.yml.j2
    dest: "{{ svc_compose_dir }}/authentik/blueprints/proxy-services.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart authentik

- name: Authentik | Template amp-groups blueprint
  ansible.builtin.template:
    src: authentik/blueprints/amp-groups.yml.j2
    dest: "{{ svc_compose_dir }}/authentik/blueprints/amp-groups.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart authentik

# ─── OIDC Groups Scope Mapping ────────────────────────────────────────────────
# Ensure the 'groups' scope mapping exists for OAuth2 providers.
# This is required for AMP group-based role mapping to work.

- name: Authentik | Check if groups scope mapping exists
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/propertymappings/provider/scope/?search=groups"
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    status_code: 200
  register: _groups_scope_check
  delegate_to: localhost
  become: false

- name: Authentik | Create groups scope mapping
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/propertymappings/provider/scope/"
    method: POST
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    body_format: json
    body:
      name: "groups"
      scope_name: "groups"
      expression: |-
        claim = user.ak_groups.all().values_list('name', flat=True)
        return list(claim)
    status_code: [200, 201]
  register: _groups_scope_create
  delegate_to: localhost
  become: false
  when: _groups_scope_check.json.pagination.count | int == 0

- name: Authentik | Template LDAP blueprint
  ansible.builtin.template:
    src: authentik/blueprints/ldap.yaml.j2
    dest: "{{ svc_compose_dir }}/authentik/blueprints/ldap.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart authentik

- name: Authentik | Template environment file
  ansible.builtin.template:
    src: authentik/.env.j2
    dest: "{{ svc_compose_dir }}/authentik/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart authentik

- name: Authentik | Template docker-compose.yml
  ansible.builtin.template:
    src: authentik/docker-compose.yml.j2
    dest: "{{ svc_compose_dir }}/authentik/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart authentik

- name: Authentik | Pull images
  ansible.builtin.command: docker compose pull
  args:
    chdir: "{{ svc_compose_dir }}/authentik"
  changed_when: false

- name: Authentik | Deploy stack
  ansible.builtin.command: docker compose up -d --remove-orphans
  args:
    chdir: "{{ svc_compose_dir }}/authentik"
  register: _authentik_up
  changed_when: "'Started' in _authentik_up.stdout or 'Recreated' in _authentik_up.stdout"

# Flush any pending restart before making API calls — ensures Authentik is running
# on the current config before we try to manage blueprints.
- name: Authentik | Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Authentik | Wait for API to become ready
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/core/users/me/"
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    status_code: 200
  register: _authentik_api_ready
  retries: 30
  delay: 10
  until: _authentik_api_ready.status == 200
  delegate_to: localhost
  become: false

# ─── Blueprint lifecycle management ──────────────────────────────────────────
# Authentik's autodiscovery fires on worker restart but is subject to timing
# races that can silently drop the registration. We manage the blueprint
# instance directly via API so the playbook is the sole source of truth.

- name: Authentik | Check if proxy-services blueprint instance exists
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/managed/blueprints/?search=proxy-services"
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    status_code: 200
  register: _blueprint_list
  delegate_to: localhost
  become: false

- name: Authentik | Register proxy-services blueprint instance
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/managed/blueprints/"
    method: POST
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    body_format: json
    body:
      name: "proxy-services"
      path: "custom/proxy-services.yaml"
      enabled: true
      context: {}
    status_code: [200, 201]
  register: _blueprint_create
  delegate_to: localhost
  become: false
  when: _blueprint_list.json.pagination.count | int == 0

- name: Authentik | Get current blueprint file hash from available list
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/managed/blueprints/available/"
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    status_code: 200
  register: _blueprints_available
  delegate_to: localhost
  become: false

- name: Authentik | Set blueprint management facts
  ansible.builtin.set_fact:
    _blueprint_pk: >-
      {{
        (_blueprint_list.json.results | first).pk
        if (_blueprint_list.json.pagination.count | int) > 0
        else _blueprint_create.json.pk
      }}
    _blueprint_file_hash: >-
      {{
        (_blueprints_available.json
          | selectattr('path', 'equalto', 'custom/proxy-services.yaml')
          | list | first).hash
      }}
    _blueprint_applied_hash: >-
      {{
        (_blueprint_list.json.results | first).last_applied_hash
        if (_blueprint_list.json.pagination.count | int) > 0
        else ''
      }}

- name: Authentik | Apply blueprint if file changed or not yet applied
  ansible.builtin.uri:
    url: "https://{{ svc_authentik_domain }}/api/v3/managed/blueprints/{{ _blueprint_pk }}/apply/"
    method: POST
    headers:
      Authorization: "Bearer {{ authentik_bootstrap_token }}"
    status_code: 200
  register: _blueprint_apply
  failed_when: _blueprint_apply.json.status != 'successful'
  delegate_to: localhost
  become: false
  when: _blueprint_applied_hash != _blueprint_file_hash

