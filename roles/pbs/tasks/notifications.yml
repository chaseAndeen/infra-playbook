---
- name: PBS Notifications | Check existing SMTP endpoints
  ansible.builtin.command: proxmox-backup-manager notification endpoint smtp list --output-format json
  register: _pbs_smtp_endpoints
  changed_when: false
  failed_when: false

- name: PBS Notifications | Create SMTP endpoint
  ansible.builtin.command: >
    proxmox-backup-manager notification endpoint smtp create ses-smtp
    --server {{ smtp_server }}
    --port {{ smtp_port }}
    --mode starttls
    --from-address {{ smtp_from }}
    --mailto {{ smtp_to }}
    --username {{ smtp_user }}
    --password {{ smtp_pass }}
    --author "Proxmox Backup Server"
  no_log: true
  register: _pbs_smtp_create
  changed_when: _pbs_smtp_create.rc == 0
  failed_when:
    - _pbs_smtp_create.rc != 0
    - "'already exists' not in _pbs_smtp_create.stderr"
  when: >
    _pbs_smtp_endpoints.rc != 0 or
    'ses-smtp' not in (_pbs_smtp_endpoints.stdout | from_json | map(attribute='name') | list)

- name: PBS Notifications | Check existing matchers
  ansible.builtin.command: proxmox-backup-manager notification matcher list --output-format json
  register: _pbs_matchers
  changed_when: false
  failed_when: false

- name: PBS Notifications | Disable default mail-to-root matcher
  vars:
    _default_matcher: >-
      {{ _pbs_matchers.stdout | from_json |
         selectattr('name', 'equalto', 'default-matcher') |
         list | first | default({}) }}
  ansible.builtin.command: >
    proxmox-backup-manager notification matcher update default-matcher
    --disable true
  register: _pbs_disable_default
  changed_when: true
  when:
    - _pbs_matchers.rc == 0
    - _default_matcher | length > 0
    - not (_default_matcher.get('disable', false) | bool)

# Delete backup-results if it has the wrong match-field (backup-finish → backup)
# or was disabled during debugging. mode:all with one match-field is correct,
# but update cannot remove a match-field — delete and recreate instead.
- name: PBS Notifications | Delete misconfigured backup-results matcher
  vars:
    _backup_matcher: >-
      {{ _pbs_matchers.stdout | from_json |
         selectattr('name', 'equalto', 'backup-results') |
         list | first | default({}) }}
  ansible.builtin.command: proxmox-backup-manager notification matcher delete backup-results
  when:
    - _pbs_matchers.rc == 0
    - _backup_matcher | length > 0
    - >-
      (_backup_matcher.get('disable', false) | bool) or
      'exact:type=backup-finish' in (_backup_matcher.get('match-field', []))
  changed_when: true

# Delete prune-gc-results — mode:any makes it fire on type=prune regardless of
# severity (any condition being true is sufficient). Replace with two mode:all
# matchers so type AND severity must both match.
- name: PBS Notifications | Delete broken prune-gc-results matcher
  ansible.builtin.command: proxmox-backup-manager notification matcher delete prune-gc-results
  when:
    - _pbs_matchers.rc == 0
    - >-
      'prune-gc-results' in (_pbs_matchers.stdout | from_json | map(attribute='name') | list)
  changed_when: true

- name: PBS Notifications | Re-check matchers after cleanup
  ansible.builtin.command: proxmox-backup-manager notification matcher list --output-format json
  register: _pbs_matchers2
  changed_when: false
  failed_when: false

- name: PBS Notifications | Create backup-results matcher
  ansible.builtin.command: >
    proxmox-backup-manager notification matcher create backup-results
    --target ses-smtp
    --match-field exact:type=backup
    --match-severity error
    --match-severity warning
    --mode all
    --comment "Backup job failures and warnings"
  register: _pbs_backup_matcher
  changed_when: _pbs_backup_matcher.rc == 0
  failed_when:
    - _pbs_backup_matcher.rc != 0
    - "'already exists' not in _pbs_backup_matcher.stderr"
  when: >
    _pbs_matchers2.rc != 0 or
    'backup-results' not in (_pbs_matchers2.stdout | from_json | map(attribute='name') | list)

- name: PBS Notifications | Create prune-failures matcher
  ansible.builtin.command: >
    proxmox-backup-manager notification matcher create prune-failures
    --target ses-smtp
    --match-field exact:type=prune
    --match-severity error
    --mode all
    --comment "Prune job failures"
  register: _pbs_prune_matcher
  changed_when: _pbs_prune_matcher.rc == 0
  failed_when:
    - _pbs_prune_matcher.rc != 0
    - "'already exists' not in _pbs_prune_matcher.stderr"
  when: >
    _pbs_matchers2.rc != 0 or
    'prune-failures' not in (_pbs_matchers2.stdout | from_json | map(attribute='name') | list)

- name: PBS Notifications | Create gc-failures matcher
  ansible.builtin.command: >
    proxmox-backup-manager notification matcher create gc-failures
    --target ses-smtp
    --match-field exact:type=gc
    --match-severity error
    --mode all
    --comment "Garbage collection failures"
  register: _pbs_gc_matcher
  changed_when: _pbs_gc_matcher.rc == 0
  failed_when:
    - _pbs_gc_matcher.rc != 0
    - "'already exists' not in _pbs_gc_matcher.stderr"
  when: >
    _pbs_matchers2.rc != 0 or
    'gc-failures' not in (_pbs_matchers2.stdout | from_json | map(attribute='name') | list)
