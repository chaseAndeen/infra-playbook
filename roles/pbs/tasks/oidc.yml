---
# Configure OpenID Connect realms in Proxmox Backup Server.
# Processes proxy_services entries where auth == oidc and oidc.target == pbs.
# Client secrets are read from SSM (generated by svc.yml's authentik tasks).

- name: PBS OIDC | List existing realms
  ansible.builtin.command: proxmox-backup-manager openid list --output-format json
  register: _pbs_realms
  changed_when: false

- name: PBS OIDC | Build realm name list
  ansible.builtin.set_fact:
    _pbs_realm_names: "{{ (_pbs_realms.stdout | from_json) | map(attribute='realm') | list }}"

- name: PBS OIDC | Add OpenID realm
  ansible.builtin.command: >
    proxmox-backup-manager openid create {{ item.oidc.realm_name }}
    --issuer-url https://{{ svc_authentik_domain }}/application/o/{{ item.name }}/
    --client-id {{ item.oidc.client_id }}
    --client-key {{ lookup('amazon.aws.ssm_parameter', '/infra/svc/oidc/' ~ item.name ~ '/client_secret', profile=aws_profile, region=aws_region) }}
    --username-claim {{ item.oidc.username_claim | default('email') }}
    --autocreate {{ 'true' if item.oidc.autocreate | default(false) else 'false' }}
  loop: "{{ proxy_services | selectattr('auth', 'equalto', 'oidc') | selectattr('oidc.target', 'equalto', 'pbs') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.oidc.realm_name not in _pbs_realm_names
  changed_when: true
  no_log: true

- name: PBS OIDC | Grant Admin role to OIDC admin users
  ansible.builtin.command: >
    proxmox-backup-manager acl update / Admin
    --auth-id "{{ item.0 }}@{{ item.1.oidc.realm_name }}"
    --propagate true
  loop: "{{ pbs_oidc_admins | product(proxy_services | selectattr('auth', 'equalto', 'oidc') | selectattr('oidc.target', 'equalto', 'pbs') | list) | list }}"
  loop_control:
    label: "{{ item.0 }}@{{ item.1.oidc.realm_name }}"
  changed_when: false
  failed_when: false

- name: PBS OIDC | Sync OpenID realm config
  ansible.builtin.command: >
    proxmox-backup-manager openid update {{ item.oidc.realm_name }}
    --issuer-url https://{{ svc_authentik_domain }}/application/o/{{ item.name }}/
    --client-id {{ item.oidc.client_id }}
    --client-key {{ lookup('amazon.aws.ssm_parameter', '/infra/svc/oidc/' ~ item.name ~ '/client_secret', profile=aws_profile, region=aws_region) }}
    --autocreate {{ 'true' if item.oidc.autocreate | default(false) else 'false' }}
  loop: "{{ proxy_services | selectattr('auth', 'equalto', 'oidc') | selectattr('oidc.target', 'equalto', 'pbs') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.oidc.realm_name in _pbs_realm_names
  changed_when: false
  no_log: true
