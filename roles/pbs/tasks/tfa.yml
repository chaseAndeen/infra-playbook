---
# PBS does not support realm-level TFA enforcement.
# TFA is configured per-user. This task checks whether the admin user
# has TFA set up and warns if not — the user must complete setup via the PBS web UI.

- name: PBS TFA | Check if admin user has TFA configured
  ansible.builtin.command: >
    proxmox-backup-manager user tfa list {{ proxmox_user }}@pam --output-format json
  register: pbs_tfa_check
  changed_when: false
  failed_when: false

- name: PBS TFA | Warn if admin user has no TFA configured
  ansible.builtin.debug:
    msg: >
      WARNING: {{ proxmox_user }}@pam has no TFA configured on PBS.
      Log into the PBS web UI and set up TOTP under
      Administration > User Management > {{ proxmox_user }}@pam > TFA.
  when: >
    pbs_tfa_check.rc == 0 and
    (pbs_tfa_check.stdout | from_json | length) == 0

- name: PBS TFA | Confirm TFA is configured
  ansible.builtin.debug:
    msg: "TFA is configured for {{ proxmox_user }}@pam on PBS."
  when: >
    pbs_tfa_check.rc == 0 and
    (pbs_tfa_check.stdout | from_json | length) > 0
