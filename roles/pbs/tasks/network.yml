---
- name: PBS | Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: PBS | Allow SSH from management CIDRs
  community.general.ufw:
    rule: allow
    port: "{{ proxmox_ssh_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ mgmt_cidrs }}"

- name: PBS | Allow PBS web UI and backup protocol from management CIDRs
  community.general.ufw:
    rule: allow
    port: "{{ pbs_gui_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ mgmt_cidrs }}"

- name: PBS | Allow PBS backup protocol from Proxmox node subnet
  community.general.ufw:
    rule: allow
    port: "{{ pbs_gui_port }}"
    proto: tcp
    src: "{{ pve_network_cidr }}"

- name: PBS | Allow PBS web UI from services network (Traefik reverse proxy)
  community.general.ufw:
    rule: allow
    port: "{{ pbs_gui_port }}"
    proto: tcp
    src: "{{ svc_network_cidr }}"

- name: PBS | Enable UFW with default deny
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
