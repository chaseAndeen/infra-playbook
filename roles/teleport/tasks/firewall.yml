---
- name: Teleport Firewall | Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Teleport Firewall | Allow SSH
  community.general.ufw:
    rule: allow
    port: "{{ proxmox_ssh_port }}"
    proto: tcp

- name: Teleport Firewall | Allow Teleport proxy (HTTPS + ACME)
  community.general.ufw:
    rule: allow
    port: "{{ teleport_proxy_port }}"
    proto: tcp

- name: Teleport Firewall | Allow Teleport SSH proxy
  community.general.ufw:
    rule: allow
    port: "{{ teleport_ssh_proxy_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ mgmt_cidrs }}"

- name: Teleport Firewall | Allow Teleport reverse tunnel
  community.general.ufw:
    rule: allow
    port: "{{ teleport_reverse_tunnel_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ mgmt_cidrs }}"

- name: Teleport Firewall | Allow Teleport auth (internal only)
  community.general.ufw:
    rule: allow
    port: "{{ teleport_auth_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ mgmt_cidrs }}"

- name: Teleport Firewall | Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
