---
- name: Terraform | Ensure user exists
  ansible.builtin.command: "pveum user add terraform-prov@pve --password {{ terraform_tmp_pass | mandatory }}"
  register: _user_cmd
  failed_when: "_user_cmd.rc != 0 and 'already exists' not in _user_cmd.stderr"
  changed_when: "_user_cmd.rc == 0"

- name: Terraform | Create role
  ansible.builtin.command: >
    pveum role add TerraformRole -privs
    "VM.Allocate VM.Clone VM.Config.CDROM VM.Config.Cloudinit VM.Config.CPU
    VM.Config.Disk VM.Config.HWType VM.Config.Memory VM.Config.Network
    VM.Config.Options VM.Audit VM.PowerMgmt VM.Console VM.Migrate
    Datastore.Allocate Datastore.AllocateSpace Datastore.AllocateTemplate Datastore.Audit
    Sys.Audit Sys.Console Sys.Modify Pool.Allocate SDN.Use"
  register: _terraform_role
  failed_when: "_terraform_role.rc != 0 and 'already exists' not in _terraform_role.stderr"
  changed_when: "_terraform_role.rc == 0"

- name: Terraform | Bind role to user
  ansible.builtin.command: "pveum acl modify / -user terraform-prov@pve -role TerraformRole"
  changed_when: false

- name: Terraform | Check for existing API token
  ansible.builtin.command: "pveum user token list terraform-prov@pve --output-format json"
  register: _token_check
  changed_when: false

- name: Terraform | Generate API token
  ansible.builtin.command: "pveum user token add terraform-prov@pve terraform-token --privsep 0 --output-format json"
  register: _token_gen
  when: "'terraform-token' not in _token_check.stdout"
  no_log: true
  changed_when: _token_gen.rc == 0

- name: Terraform | Store API token in SSM
  community.aws.ssm_parameter:
    name: "/infra/proxmox/terraform_token"
    description: "API Token for BPG Terraform Provider"
    value: "{{ (_token_gen.stdout | from_json).value }}"
    string_type: "SecureString"
    overwrite_value: "always"
    region: "{{ aws_region }}"
    aws_profile: "{{ aws_profile }}"
  delegate_to: localhost
  become: false
  no_log: true
  when: _token_gen.changed
