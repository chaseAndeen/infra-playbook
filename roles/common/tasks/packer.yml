---
- name: Packer | Ensure user exists
  ansible.builtin.command: "pveum user add packer-builder@pve --password {{ packer_api_password | mandatory }}"
  register: _user_creation
  failed_when: "_user_creation.rc != 0 and 'already exists' not in _user_creation.stderr"
  changed_when: "_user_creation.rc == 0"

- name: Packer | Create role
  ansible.builtin.command: >
    pveum role add PackerRole --privs
    "Datastore.Allocate,Datastore.AllocateSpace,Datastore.AllocateTemplate,Datastore.Audit,
    SDN.Use,Sys.AccessNetwork,Sys.Audit,Sys.Console,Sys.Modify,
    VM.Allocate,VM.Audit,VM.Clone,VM.Config.CDROM,VM.Config.CPU,VM.Config.Cloudinit,
    VM.Config.Disk,VM.Config.HWType,VM.Config.Memory,VM.Config.Network,VM.Config.Options,
    VM.Console,VM.PowerMgmt,VM.GuestAgent.Audit,VM.GuestAgent.Unrestricted"
  register: _role_creation
  failed_when: "_role_creation.rc != 0 and 'already exists' not in _role_creation.stderr"
  changed_when: "_role_creation.rc == 0"

- name: Packer | Assign role to user
  ansible.builtin.command: "pveum acl modify / -user packer-builder@pve -role PackerRole"
  changed_when: false

- name: Packer | Check for existing API token
  ansible.builtin.command: "pveum user token list packer-builder@pve --output-format json"
  register: _token_check
  changed_when: false

- name: Packer | Generate API token
  ansible.builtin.command: "pveum user token add packer-builder@pve packer-token --privsep 0 --output-format json"
  register: _token_output
  when: "'packer-token' not in _token_check.stdout"
  no_log: true
  changed_when: _token_output.rc == 0

- name: Packer | Store API token in SSM
  community.aws.ssm_parameter:
    name: "/infra/proxmox/packer_token"
    description: "API Token for Packer Proxmox Builder"
    value: "{{ (_token_output.stdout | from_json).value }}"
    string_type: "SecureString"
    overwrite_value: "always"
    region: "{{ aws_region }}"
    aws_profile: "{{ aws_profile }}"
  delegate_to: localhost
  become: false
  no_log: true
  when: _token_output.changed
