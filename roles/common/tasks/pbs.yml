---
- name: PVE | Check if PBS fingerprint exists in SSM
  ansible.builtin.command: >
    aws ssm get-parameter
    --name "/infra/pbs/fingerprint"
    --profile {{ aws_profile }}
    --region {{ aws_region }}
  register: pbs_fingerprint_check
  delegate_to: localhost
  become: false
  failed_when: false
  changed_when: false

- name: PVE | Skip PBS registration (PBS not deployed yet)
  ansible.builtin.debug:
    msg: "PBS fingerprint not found in SSM — skipping. Run playbooks/pbs.yml first."
  when: pbs_fingerprint_check.rc != 0

- name: PVE | End host if PBS not deployed
  ansible.builtin.meta: end_host
  when: pbs_fingerprint_check.rc != 0

- name: PVE | Fetch PBS fingerprint from SSM
  ansible.builtin.set_fact:
    pbs_fingerprint: "{{ lookup('amazon.aws.ssm_parameter', '/infra/pbs/fingerprint', profile=aws_profile, region=aws_region) }}"

- name: PVE | Fetch PBS backup user password from SSM
  ansible.builtin.set_fact:
    pbs_password: "{{ lookup('amazon.aws.ssm_parameter', '/infra/pbs/backup_user_password', profile=aws_profile, region=aws_region) }}"
  no_log: true

- name: PVE | Check if PBS storage already registered
  ansible.builtin.command: pvesm status --storage {{ pbs_storage_id }}
  register: pbs_storage_check
  changed_when: false
  failed_when: false

- name: PVE | Register PBS as Proxmox storage backend
  ansible.builtin.command: >
    pvesm add pbs {{ pbs_storage_id }}
    --server {{ pbs_server }}
    --datastore {{ pbs_datastore_name }}
    --username {{ pbs_backup_user }}
    --password {{ pbs_password }}
    --fingerprint {{ pbs_fingerprint }}
    --content backup
  no_log: true
  when: pbs_storage_check.rc != 0
  changed_when: true

- name: PVE | Check existing backup jobs
  ansible.builtin.command: pvesh get /cluster/backup --output-format json
  register: existing_backup_jobs
  changed_when: false

- name: PVE | Create daily backup job for all VMs
  ansible.builtin.command: >
    pvesh create /cluster/backup
    --storage {{ pbs_storage_id }}
    --schedule "{{ pbs_backup_schedule }}"
    --all 1
    --mode {{ pbs_backup_mode }}
    --notification-mode notification-system
    --notes-template "{{ '{{guestname}}' }}"
    --fleecing 0
    --repeat-missed 0
    --enabled 1
  register: backup_job_create
  changed_when: backup_job_create.rc == 0
  failed_when:
    - backup_job_create.rc != 0
    - "'already exists' not in backup_job_create.stderr"
  when: >
    existing_backup_jobs.stdout | from_json |
    selectattr('storage', 'equalto', pbs_storage_id) |
    list | length == 0

- name: PVE | Discover all VMs on this node
  ansible.builtin.command: pvesh get /nodes/{{ ansible_facts['hostname'] }}/qemu --output-format json
  register: pve_all_vms
  changed_when: false

- name: PVE | Build backup exclusion list (templates + PBS VM)
  ansible.builtin.set_fact:
    pbs_exclude_vmids: >-
      {{
        (
          (pve_all_vms.stdout | from_json |
            selectattr('template', 'defined') |
            selectattr('template', 'equalto', 1) |
            map(attribute='vmid') | list)
          +
          (pve_all_vms.stdout | from_json |
            selectattr('name', 'equalto', groups['pbs'][0]) |
            map(attribute='vmid') | list)
        ) | map('string') | list | unique | sort
      }}

- name: PVE | Update backup job exclusions if out of date
  vars:
    _backup_job: >-
      {{
        existing_backup_jobs.stdout | from_json |
        selectattr('storage', 'equalto', pbs_storage_id) |
        list | first | default({})
      }}
    _current: >-
      {{
        (_backup_job.get('exclude', '') | string).split(',') |
        reject('equalto', '') | list | sort
      }}
    _desired: "{{ pbs_exclude_vmids | sort }}"
  ansible.builtin.command: >
    pvesh set /cluster/backup/{{ _backup_job.id }}
    --exclude {{ pbs_exclude_vmids | join(',') }}
  when:
    - _backup_job | length > 0
    - _current != _desired
  changed_when: true
