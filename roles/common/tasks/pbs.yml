---
# ─── PBS Storage Registration ──────────────────────────────────────────────────

- name: PVE | Check if PBS fingerprint exists in SSM
  ansible.builtin.command: >
    aws ssm get-parameter
    --name "/infra/pbs/fingerprint"
    --profile {{ aws_profile }}
    --region {{ aws_region }}
  register: _pbs_fingerprint_check
  delegate_to: localhost
  become: false
  failed_when: false
  changed_when: false

- name: PVE | Skip PBS registration (PBS not deployed yet)
  ansible.builtin.debug:
    msg: "PBS fingerprint not found in SSM — skipping. Run playbooks/pbs.yml first."
  when: _pbs_fingerprint_check.rc != 0

- name: PVE | End host if PBS not deployed
  ansible.builtin.meta: end_host
  when: _pbs_fingerprint_check.rc != 0

- name: PVE | Fetch PBS fingerprint from SSM
  ansible.builtin.set_fact:
    pbs_fingerprint: "{{ lookup('amazon.aws.ssm_parameter', '/infra/pbs/fingerprint', profile=aws_profile, region=aws_region) }}"

- name: PVE | Fail if PBS fingerprint is empty
  ansible.builtin.fail:
    msg: "PBS fingerprint fetched from SSM is empty — run playbooks/pbs.yml first to populate it."
  when: pbs_fingerprint | length == 0

- name: PVE | Fetch PBS backup user password from SSM
  ansible.builtin.set_fact:
    pbs_password: "{{ lookup('amazon.aws.ssm_parameter', '/infra/pbs/backup_user_password', profile=aws_profile, region=aws_region) }}"
  no_log: true

- name: PVE | Check if PBS storage already registered
  ansible.builtin.command: pvesm status --storage {{ pbs_storage_id }}
  register: _pbs_storage_check
  changed_when: false
  failed_when: false

- name: PVE | Register PBS as Proxmox storage backend
  ansible.builtin.command: >
    pvesm add pbs {{ pbs_storage_id }}
    --server {{ pbs_server }}
    --datastore {{ pbs_datastore_name }}
    --username {{ pbs_backup_user }}
    --password {{ pbs_password }}
    --fingerprint {{ pbs_fingerprint }}
    --content backup
  no_log: true
  when: _pbs_storage_check.rc != 0
  changed_when: true

- name: PVE | Read current fingerprint from storage config
  ansible.builtin.shell: >
    grep -A 20 'pbs: {{ pbs_storage_id }}' /etc/pve/storage.cfg
    | grep 'fingerprint'
    | awk '{print $2}'
  register: _pbs_stored_fingerprint
  changed_when: false
  when: _pbs_storage_check.rc == 0

- name: PVE | Update PBS fingerprint if stale
  ansible.builtin.command: >
    pvesm set {{ pbs_storage_id }} --fingerprint {{ pbs_fingerprint }}
  when:
    - _pbs_storage_check.rc == 0
    - (_pbs_stored_fingerprint.stdout | trim) != (pbs_fingerprint | trim)
  changed_when: true

# ─── Backup Job Management ────────────────────────────────────────────────────
# Jobs are defined in pve_backup_jobs (group_vars/all.yml).
# Matched by comment field for idempotency — created if missing, updated if changed.
# Retention is per-job via --prune-backups; the PBS datastore prune job is removed.
#
# Auto-exclusions applied to all: true jobs:
#   - VM templates (detected dynamically)
#   - The PBS VM itself (detected by hostname match against pbs inventory group)
#   - Any VM targeted by an all: false job in pve_backup_jobs

- name: PVE | Discover all VMs on this node
  ansible.builtin.command: pvesh get /nodes/{{ inventory_hostname }}/qemu --output-format json
  register: _pve_all_vms
  changed_when: false

- name: PVE | Build VM name-to-vmid map
  ansible.builtin.set_fact:
    _pve_vm_map: >-
      {{
        dict(
          (_pve_all_vms.stdout | from_json | map(attribute='name') | list)
          | zip(
            _pve_all_vms.stdout | from_json | map(attribute='vmid') | map('string') | list
          )
        )
      }}

- name: PVE | Build base exclusion list (templates and PBS VM)
  ansible.builtin.set_fact:
    _pve_base_exclude: >-
      {{
        (
          _pve_all_vms.stdout | from_json
          | selectattr('template', 'defined')
          | selectattr('template', 'equalto', 1)
          | map(attribute='vmid') | map('string') | list
        ) + (
          _pve_all_vms.stdout | from_json
          | selectattr('name', 'equalto', groups['pbs'][0])
          | map(attribute='vmid') | map('string') | list
        ) | unique | sort
      }}

- name: PVE | Resolve VMIDs for targeted backup jobs
  ansible.builtin.set_fact:
    _pve_targeted_vmids: >-
      {{
        pve_backup_jobs
        | rejectattr('all', 'equalto', true) | list
        | map(attribute='target_groups') | flatten | unique
        | map('extract', groups) | flatten
        | map('extract', _pve_vm_map)
        | select('defined')
        | reject('equalto', none)
        | map('string') | list | unique | sort
      }}

- name: PVE | Get existing backup jobs
  ansible.builtin.command: pvesh get /cluster/backup --output-format json
  register: _pve_existing_jobs
  changed_when: false

# Build a resolved list combining desired config with runtime data (existing job,
# computed exclude/vmid/prune strings) so create and update tasks stay readable.
- name: PVE | Resolve per-job parameters
  ansible.builtin.set_fact:
    _pve_resolved_jobs: >-
      {{
        (_pve_resolved_jobs | default([])) + [{
          'config': item,
          'existing': (
            _pve_existing_jobs.stdout | from_json
            | selectattr('comment', 'defined')
            | selectattr('comment', 'equalto', item.comment)
            | list | first | default({})
          ),
          'exclude_arg': (
            (_pve_base_exclude + _pve_targeted_vmids) | unique | sort | join(',')
          ) if (item.all | default(false)) else '',
          'vmid_arg': (
            item.target_groups | default([])
            | map('extract', groups) | flatten
            | map('extract', _pve_vm_map)
            | select('defined')
            | reject('equalto', none)
            | map('string') | list | unique | sort | join(',')
          ) if not (item.all | default(false)) else '',
          'prune_arg': (
            (
              (['keep-daily='   + (item.keep_daily   | string)] if (item.keep_daily   | default(0) | int) > 0 else []) +
              (['keep-weekly='  + (item.keep_weekly  | string)] if (item.keep_weekly  | default(0) | int) > 0 else []) +
              (['keep-monthly=' + (item.keep_monthly | string)] if (item.keep_monthly | default(0) | int) > 0 else [])
            ) | join(',')
          ),
        }]
      }}
  loop: "{{ pve_backup_jobs }}"

- name: PVE | Warn about targeted jobs with no resolved VMIDs
  ansible.builtin.debug:
    msg: >-
      Skipping backup job '{{ item.config.comment }}' — no VMIDs resolved for
      target_groups {{ item.config.target_groups | default([]) }}.
      Ensure those hosts are deployed in PVE first.
  loop: "{{ _pve_resolved_jobs }}"
  when:
    - not (item.config.all | default(false))
    - item.vmid_arg | length == 0

- name: PVE | Create new backup jobs
  ansible.builtin.command:
    argv: >-
      {{
        ['pvesh', 'create', '/cluster/backup',
         '--storage',            pbs_storage_id,
         '--comment',            item.config.comment,
         '--schedule',           item.config.schedule,
         '--mode',               item.config.mode,
         '--prune-backups',      item.prune_arg,
         '--notification-mode',  'notification-system',
         '--notes-template',     '{{guestname}}',
         '--enabled',            '1']
        + (['--all', '1'] if (item.config.all | default(false)) else ['--vmid', item.vmid_arg])
        + (['--exclude', item.exclude_arg] if item.exclude_arg else [])
      }}
  loop: "{{ _pve_resolved_jobs }}"
  when:
    - item.existing | length == 0
    - (item.config.all | default(false)) or item.vmid_arg | length > 0
  changed_when: true

- name: PVE | Update changed backup jobs
  vars:
    _ex: "{{ item.existing }}"
    _prune_match: >-
      {{
        (_ex['prune-backups'] | default('') | replace(' ', ''))
        == item.prune_arg
      }}
    _exclude_match: >-
      {{
        (_ex.exclude | default('') | string | split(',') | reject('equalto', '') | sort | join(','))
        == (item.exclude_arg | split(',') | reject('equalto', '') | sort | join(','))
      }}
    _vmid_match: >-
      {{
        (_ex.vmid | default('') | string | split(',') | reject('equalto', '') | sort | join(','))
        == (item.vmid_arg | split(',') | reject('equalto', '') | sort | join(','))
      }}
  ansible.builtin.command:
    argv: >-
      {{
        ['pvesh', 'set', '/cluster/backup/' + _ex.id,
         '--schedule',          item.config.schedule,
         '--mode',              item.config.mode,
         '--prune-backups',     item.prune_arg,
         '--notification-mode', 'notification-system',
         '--enabled',           '1']
        + (['--all', '1'] if (item.config.all | default(false)) else ['--vmid', item.vmid_arg])
        + (['--exclude', item.exclude_arg] if item.exclude_arg else [])
      }}
  loop: "{{ _pve_resolved_jobs }}"
  when:
    - item.existing | length > 0
    - (item.config.all | default(false)) or item.vmid_arg | length > 0
    - >-
        (_ex.schedule | default('')) != item.config.schedule
        or (_ex.mode | default('')) != item.config.mode
        or not _prune_match
        or not _exclude_match
        or not _vmid_match
  changed_when: true
