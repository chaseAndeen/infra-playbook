---
- name: Storage | Install ZFS tools
  ansible.builtin.apt:
    name: zfsutils-linux
    state: present

- name: Storage | NVMe ZFS and Proxmox storage
  when: pve_nvme_provision | bool
  block:
    - name: Storage | Check if ZFS pool exists
      ansible.builtin.command: "zpool list -H -o name {{ pve_zfs_pool }}"
      register: _zpool_exists
      changed_when: false
      failed_when: false

    - name: Storage | Check if device already has ZFS labels
      ansible.builtin.command: "zdb -l {{ pve_zfs_device }}"
      register: _zdb_check
      changed_when: false
      failed_when: false
      when: _zpool_exists.rc != 0

    - name: Storage | Wipe disk signatures
      ansible.builtin.command: "wipefs -a {{ pve_zfs_device }}"
      when:
        - _zpool_exists.rc != 0
        - _zdb_check.rc != 0
      changed_when: true

    - name: Storage | Create ZFS pool (DESTRUCTIVE)
      ansible.builtin.command: >
        zpool create -f -o ashift=12
        -O compression=lz4
        -O xattr=sa
        -O atime=off
        {{ pve_zfs_pool }} {{ pve_zfs_device }}
      when:
        - _zpool_exists.rc != 0
        - _zdb_check.rc != 0
      changed_when: true

    - name: Storage | Enable autotrim
      ansible.builtin.command: "zpool set autotrim=on {{ pve_zfs_pool }}"
      changed_when: false

    - name: Storage | Check if Proxmox storage exists
      ansible.builtin.command: "pvesm status --storage {{ pve_nvme_storage_id }}"
      register: _pve_storage_exists
      changed_when: false
      failed_when: false

    - name: Storage | Create Proxmox ZFS storage
      ansible.builtin.command: >
        pvesm add zfspool {{ pve_nvme_storage_id }}
        --pool {{ pve_zfs_pool }}
        --content images,rootdir
        --sparse 1
      when: _pve_storage_exists.rc != 0
      changed_when: true

- name: Storage | Check if local-lvm is active
  ansible.builtin.command: pvesm status --storage local-lvm
  register: _local_lvm_status
  failed_when: false
  changed_when: false
  when: pve_disable_local_lvm | bool

- name: Storage | Disable local-lvm
  ansible.builtin.command: "pvesm set local-lvm --disable 1"
  when:
    - pve_disable_local_lvm | bool
    - _local_lvm_status.rc == 0
    - "'inactive' not in _local_lvm_status.stdout"
  register: _disable_result
  changed_when: _disable_result.rc == 0
