---
- name: PVE Notifications | Check existing SMTP endpoints
  ansible.builtin.command: pvesh get /cluster/notifications/endpoints/smtp --output-format json
  register: _smtp_endpoints
  changed_when: false
  failed_when: false

- name: PVE Notifications | Create SMTP endpoint
  ansible.builtin.command: >
    pvesh create /cluster/notifications/endpoints/smtp
    --name ses-smtp
    --server {{ smtp_server }}
    --port {{ smtp_port }}
    --mode starttls
    --from-address {{ smtp_from }}
    --mailto {{ smtp_to }}
    --username {{ smtp_user }}
    --password {{ smtp_pass }}
    --author "Proxmox VE"
  no_log: true
  register: _smtp_create
  changed_when: _smtp_create.rc == 0
  failed_when:
    - _smtp_create.rc != 0
    - "'already exists' not in _smtp_create.stderr"
  when: >
    _smtp_endpoints.rc != 0 or
    'ses-smtp' not in (_smtp_endpoints.stdout | from_json | map(attribute='name') | list)

- name: PVE Notifications | Check existing matchers
  ansible.builtin.command: pvesh get /cluster/notifications/matchers --output-format json
  register: _notification_matchers
  changed_when: false
  failed_when: false

- name: PVE Notifications | Disable default-matcher (routes all events to local sendmail)
  vars:
    _default_matcher: >-
      {{ _notification_matchers.stdout | from_json |
         selectattr('name', 'equalto', 'default-matcher') |
         list | first | default({}) }}
  ansible.builtin.command: >
    pvesh set /cluster/notifications/matchers/default-matcher
    --disable 1
  register: _disable_default
  changed_when: true
  when:
    - _notification_matchers.rc == 0
    - _default_matcher | length > 0
    - not (_default_matcher.get('disable', false) | bool)

- name: PVE Notifications | Create backup failure matcher
  ansible.builtin.command: >
    pvesh create /cluster/notifications/matchers
    --name backup-failures
    --target ses-smtp
    --match-field "exact:type=vzdump"
    --match-severity error
    --match-severity warning
    --mode all
    --comment "Backup job failures and warnings"
  register: _backup_matcher
  changed_when: _backup_matcher.rc == 0
  failed_when:
    - _backup_matcher.rc != 0
    - "'already exists' not in _backup_matcher.stderr"
  when: >
    _notification_matchers.rc != 0 or
    'backup-failures' not in (_notification_matchers.stdout | from_json | map(attribute='name') | list)

- name: PVE Notifications | Fix backup-failures matcher severity if incorrect
  vars:
    _backup_matcher_existing: >-
      {{ _notification_matchers.stdout | from_json |
         selectattr('name', 'equalto', 'backup-failures') |
         list | first | default({}) }}
  ansible.builtin.command: >
    pvesh set /cluster/notifications/matchers/backup-failures
    --match-severity error
    --match-severity warning
  when:
    - _notification_matchers.rc == 0
    - _backup_matcher_existing | length > 0
    - (_backup_matcher_existing.get('match-severity', []) | sort) != ['error', 'warning']
  changed_when: true

- name: PVE Notifications | Create system health matcher
  ansible.builtin.command: >
    pvesh create /cluster/notifications/matchers
    --name system-health
    --target ses-smtp
    --match-field "exact:type=system-mail"
    --match-severity error
    --match-severity warning
    --match-severity unknown
    --mode all
    --comment "System health events including ZFS and storage"
  register: _health_matcher
  changed_when: _health_matcher.rc == 0
  failed_when:
    - _health_matcher.rc != 0
    - "'already exists' not in _health_matcher.stderr"
  when: >
    _notification_matchers.rc != 0 or
    'system-health' not in (_notification_matchers.stdout | from_json | map(attribute='name') | list)

- name: PVE Notifications | Fix system-health matcher severity if incorrect
  vars:
    _health_matcher_existing: >-
      {{ _notification_matchers.stdout | from_json |
         selectattr('name', 'equalto', 'system-health') |
         list | first | default({}) }}
  ansible.builtin.command: >
    pvesh set /cluster/notifications/matchers/system-health
    --match-severity error
    --match-severity warning
    --match-severity unknown
  when:
    - _notification_matchers.rc == 0
    - _health_matcher_existing | length > 0
    - (_health_matcher_existing.get('match-severity', []) | sort) != ['error', 'unknown', 'warning']
  changed_when: true
