---
# Configure OpenID Connect realms in Proxmox VE.
# Processes proxy_services entries where auth == oidc and oidc.target == pve.
# Client secrets are read from SSM (generated by svc.yml's authentik tasks).

- name: PVE OIDC | List existing realms
  ansible.builtin.command: pveum realm list --output-format json
  register: _pve_realms
  changed_when: false

- name: PVE OIDC | Build realm name list
  ansible.builtin.set_fact:
    _pve_realm_names: "{{ (_pve_realms.stdout | from_json) | map(attribute='realm') | list }}"

- name: PVE OIDC | Add OpenID realm
  ansible.builtin.command: >
    pveum realm add {{ item.oidc.realm_name }}
    --type openid
    --issuer-url https://{{ svc_authentik_domain }}/application/o/{{ item.name }}/
    --client-id {{ item.oidc.client_id }}
    --client-key {{ lookup('amazon.aws.ssm_parameter', '/infra/svc/oidc/' ~ item.name ~ '/client_secret', profile=aws_profile, region=aws_region) }}
    --username-claim {{ item.oidc.username_claim | default('email') }}
    --autocreate {{ '1' if item.oidc.autocreate | default(false) else '0' }}
  loop: "{{ proxy_services | selectattr('auth', 'equalto', 'oidc') | selectattr('oidc.target', 'equalto', 'pve') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.oidc.realm_name not in _pve_realm_names
  changed_when: true
  no_log: true

- name: PVE OIDC | Sync OpenID realm config
  ansible.builtin.command: >
    pveum realm modify {{ item.oidc.realm_name }}
    --issuer-url https://{{ svc_authentik_domain }}/application/o/{{ item.name }}/
    --client-id {{ item.oidc.client_id }}
    --client-key {{ lookup('amazon.aws.ssm_parameter', '/infra/svc/oidc/' ~ item.name ~ '/client_secret', profile=aws_profile, region=aws_region) }}
    --autocreate {{ '1' if item.oidc.autocreate | default(false) else '0' }}
  loop: "{{ proxy_services | selectattr('auth', 'equalto', 'oidc') | selectattr('oidc.target', 'equalto', 'pve') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.oidc.realm_name in _pve_realm_names
  changed_when: false
  no_log: true

- name: PVE OIDC | Grant Administrator role to OIDC admin users
  ansible.builtin.command: >
    pveum acl modify /
    --user "{{ item.0 }}@{{ item.1.oidc.realm_name }}"
    --role Administrator
  loop: "{{ pve_oidc_admins | product(proxy_services | selectattr('auth', 'equalto', 'oidc') | selectattr('oidc.target', 'equalto', 'pve') | list) | list }}"
  loop_control:
    label: "{{ item.0 }}@{{ item.1.oidc.realm_name }}"
  changed_when: false
  failed_when: false
