---
- name: PVE System | Remove enterprise repo
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    state: absent

- name: PVE System | Remove ceph repo
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/ceph.sources
    state: absent

- name: PVE System | Add no-subscription repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ proxmox_debian_release }}
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
    owner: root
    group: root
    mode: '0644'

- name: PVE System | Fetch Proxmox user list
  ansible.builtin.command: pveum user list
  register: _pve_users
  changed_when: false

- name: PVE System | Ensure user exists in Proxmox
  ansible.builtin.command: "pveum user add {{ proxmox_user }}@pam"
  when: (proxmox_user ~ '@pam') not in (_pve_users.stdout | string)
  changed_when: true

- name: PVE System | Ensure admin user is enabled in Proxmox
  ansible.builtin.command: "pveum user modify {{ proxmox_user }}@pam --enable 1"
  changed_when: false
  failed_when: false

- name: PVE System | Check ACLs
  ansible.builtin.command: pveum acl list
  register: _pve_acl
  changed_when: false

- name: PVE System | Grant Administrator role
  ansible.builtin.command: "pveum acl modify / -user {{ proxmox_user }}@pam -role Administrator"
  when: >
    (proxmox_user ~ '@pam.*Administrator') not in (_pve_acl.stdout | regex_replace('\s+', ' '))
  changed_when: true

- name: PVE System | Disable root login to Proxmox UI
  ansible.builtin.command: "pveum user modify root@pam --enable 0"
  changed_when: false
  failed_when: false

- name: PVE System | Remove legacy vzdump mailto (prevents root@host emails)
  ansible.builtin.lineinfile:
    path: /etc/vzdump.conf
    regexp: '^mailto\s*:'
    state: absent
